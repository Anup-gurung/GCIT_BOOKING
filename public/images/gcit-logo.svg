<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100" width="200" height="100">
  <!-- Green spiral circle -->
  <g id="spiral">
    <circle cx="35" cy="50" r="25" fill="none" stroke="#6ABF59" stroke-width="5"/>
    <path d="M 35 30 Q 50 35 55 50" fill="none" stroke="#6ABF59" stroke-width="4" stroke-linecap="round"/>
  </g>
  
  <!-- Orange IT text -->
  <g id="it-text">
    <rect x="50" y="25" width="15" height="50" fill="#FF9D2B"/>
    <rect x="70" y="35" width="12" height="40" fill="#FF9D2B"/>
    <path d="M 50 25 L 65 25 L 65 35 L 50 35" fill="#FF9D2B"/>
  </g>
  
  <!-- Green accent under IT -->
  <path d="M 50 60 Q 70 65 90 60" fill="none" stroke="#6ABF59" stroke-width="3" stroke-linecap="round"/>
</svg>